<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempero a Gosto Refeições</title>
<style>

.card{background:#fff;border-radius:16px;padding:15px;margin-bottom:15px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.item{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee;padding:12px 0}
button{border:none;background:#8b1e1e;color:#fff;padding:8px 12px;border-radius:20px;font-weight:bold}
.total{font-weight:bold;font-size:20px;margin-top:10px}
</style>
</head>

</header>

P R$18 | M R$24 | G R$30

<button>G</button>

</div>

<div class="item">

</div>
</div>
</body>
</html>
